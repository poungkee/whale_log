version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: surfwave-postgres
    restart: unless-stopped
    ## 보안: DB 포트는 외부 노출하지 않음 (내부 네트워크에서만 접근)
    ## 로컬 개발 시 직접 접근이 필요하면 아래 주석 해제
    # ports:
    #   - '5432:5432'
    environment:
      ## 프로덕션 배포 시 반드시 강력한 비밀번호로 변경 필수!
      POSTGRES_USER: ${DB_USERNAME:-surfwave}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-surfwave123}
      POSTGRES_DB: ${DB_DATABASE:-surfwave}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surfwave -d surfwave']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - surfwave-network

  redis:
    image: redis:7-alpine
    container_name: surfwave-redis
    restart: unless-stopped
    ## 보안: Redis 포트도 외부 노출하지 않음
    # ports:
    #   - '6379:6379'
    volumes:
      - redis_data:/data
    ## Redis 인증 비밀번호 설정 + AOF 영속성
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-surfwave-redis-dev}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-surfwave-redis-dev}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - surfwave-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: surfwave-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-surfwave-redis-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - surfwave-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  surfwave-network:
    driver: bridge
