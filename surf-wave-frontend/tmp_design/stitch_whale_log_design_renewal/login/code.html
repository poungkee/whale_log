<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Whale Log - Login</title>

                    "outline": "#70787d",
                    "on-surface": "#1d1c14",
                    "surface-container-highest": "#e8e2d6",
                    "surface-variant": "#e8e2d6",
                    "on-primary-fixed-variant": "#004d61",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .whale-badge-shadow {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#1F2D3D] font-body text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Abstract Coast Elements (Asymmetric Layout) -->
<div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary/10 rounded-full blur-3xl"></div>
<main class="w-full max-w-md relative z-10">
<!-- The "Sticker" Card: White surface with subtle rotation and high-end depth -->
<div class="bg-surface rounded-lg shadow-[0_20px_50px_rgba(0,0,0,0.3)] p-8 md:p-10 transform -rotate-1 hover:rotate-0 transition-transform duration-500">
<!-- Centered Brand Icon (Whale Badge) -->
<div class="flex justify-center mb-8">
<div class="relative">
<div class="w-24 h-24 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center whale-badge-shadow">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">waves</span>
</div>
<!-- Small accent sticker -->
<div class="absolute -top-2 -right-2 bg-tertiary text-on-tertiary text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-md transform rotate-12">
                        Est 1984
                    </div>
</div>
</div>
<!-- Heading -->
<div class="text-center mb-10">
<h1 class="text-2xl md:text-3xl font-headline font-extrabold tracking-tight text-on-surface leading-tight">
                    Welcome! <span class="block text-primary">Login to Whale Log.</span>
</h1>
<p class="text-on-surface-variant text-sm mt-3 font-medium opacity-80">Your hand-bound coastal journal awaits.</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Input Field: Email -->
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-DEFAULT px-5 py-4 text-on-surface font-medium focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant" id="email" placeholder="name@coastal.com" type="email" value="poungkoo@naver.com"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">alternate_email</span>
</div>
</div>
<!-- Input Field: Password -->
<div>
<div class="flex justify-between items-center mb-2 px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-tertiary hover:opacity-80 transition-opacity" href="#">Find password</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-DEFAULT px-5 py-4 text-on-surface font-medium focus:ring-2 focus:ring-primary/20 transition-all" id="password" type="password" value="••••••••"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
</div>
</div>
<!-- Options: Keep me logged in -->
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded border-none bg-surface-container-high text-primary focus:ring-primary/20 cursor-pointer" id="keep-logged" type="checkbox"/>
<label class="text-sm font-medium text-on-surface-variant cursor-pointer" for="keep-logged">Keep me logged in</label>
</div>
<!-- Main Button: Login -->
<button class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg shadow-lg hover:shadow-primary/30 active:scale-95 transition-all duration-200 flex items-center justify-center space-x-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center my-10">
<div class="flex-grow h-[2px] bg-surface-container-high"></div>
<span class="flex-shrink mx-4 text-[10px] font-black uppercase tracking-[0.2em] text-outline-variant">Or continue with</span>
<div class="flex-grow h-[2px] bg-surface-container-high"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3.5 rounded-full bg-surface-container-lowest border-none shadow-sm hover:shadow-md active:scale-95 transition-all text-sm font-bold text-on-surface">
<img alt="" class="w-5 h-5" data-alt="Google colorful logo icon on a white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIwAl6zDAag5-Qgc5HKrm_fJiQM_3dHUGu05-5OPbzjuVyuULeEoQInVVjETS25jM1HlEIkHLqufyTTQaf-hpbV-VPA9wEWt5Ij6RlqgqEd52qN9ji-KcLiiG9OgJU3u4sOaE8qYTqDfK6AnAQczaZiPEFW28LkBsysHd0nUudt0VTfwZicAX-P4Et9vMioik-ImOJQ94j4TZANVdZiJFMMUnRm-KvOyimYvhXQTa2-FTxsTEkw2v5CzCnQ7y6U3DTCLyUAkM7NFo"/>
<span>Google</span>
</button>
<!-- Kakao: Yellow #FEE500 -->
<button class="flex items-center justify-center space-x-2 py-3.5 rounded-full bg-[#FEE500] border-none shadow-sm hover:shadow-md active:scale-95 transition-all text-sm font-bold text-[#1D1C14]">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span>Kakao</span>
</button>
</div>
<!-- Sign Up Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Don't have an account? 
                    <a class="text-primary font-extrabold ml-1 hover:underline underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Decorative "Postage" element -->
<div class="mt-8 flex justify-center opacity-40">
<div class="flex flex-col items-center">
<div class="w-12 h-16 bg-surface-container-low rounded-sm flex items-center justify-center p-2 border-2 border-dashed border-outline-variant">
<span class="material-symbols-outlined text-primary-container">anchor</span>
</div>
<span class="text-[9px] font-bold uppercase tracking-widest text-surface mt-2">Quality Coastal Journaling</span>
</div>
</div>
</main>
<!-- Visual Polish: Grain Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/cardboard-flat.png')]"></div>
</body></html>
